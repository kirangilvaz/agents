<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Interview Questions Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
--text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;--accent2:#3fb950;
--critical:#f85149;--high:#d29922;--moderate:#58a6ff;--emerging:#8b949e;
--ring-critical:#f85149;--ring-high:#d29922;--ring-moderate:#58a6ff;--ring-emerging:#8b949e;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;line-height:1.5}
a{color:var(--accent);text-decoration:none}

.header{background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#1a1e2e 100%);border-bottom:1px solid var(--border);padding:24px 32px}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.header h1{font-size:24px;font-weight:700;display:flex;align-items:center;gap:12px}
.header h1 span{font-size:28px}
.badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:.5px}
.badge-pass{background:rgba(63,185,80,.15);color:#3fb950;border:1px solid rgba(63,185,80,.3)}
.badge-updated{color:var(--text2);font-size:13px}

.stat-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px}
.stat-bar-inner{max-width:1400px;margin:0 auto;display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
.stat{text-align:center;min-width:100px}
.stat-value{font-size:22px;font-weight:700;color:var(--accent)}
.stat-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.stat-critical .stat-value{color:var(--critical)}
.stat-high .stat-value{color:var(--high)}
.stat-accent2 .stat-value{color:var(--accent2)}

.tabs-container{max-width:1400px;margin:0 auto;padding:24px 32px 0}
.tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:0;border-bottom:1px solid var(--border)}
.tab{padding:10px 18px;border:none;background:transparent;color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tab:hover{color:var(--text);background:var(--surface2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(88,166,255,.05)}
.tab-count{background:var(--surface2);color:var(--text2);padding:1px 7px;border-radius:10px;font-size:11px;margin-left:6px}
.tab.active .tab-count{background:rgba(88,166,255,.15);color:var(--accent)}

.content{max-width:1400px;margin:0 auto;padding:24px 32px 64px}
.tab-content{display:none}
.tab-content.active{display:block}

.tier-section{margin-bottom:32px}
.tier-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.tier-dot{width:10px;height:10px;border-radius:50%}
.tier-dot.critical{background:var(--critical)}
.tier-dot.high{background:var(--high)}
.tier-dot.moderate{background:var(--moderate)}
.tier-dot.emerging{background:var(--emerging)}
.tier-label{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.tier-label.critical{color:var(--critical)}
.tier-label.high{color:var(--high)}
.tier-label.moderate{color:var(--moderate)}
.tier-label.emerging{color:var(--emerging)}
.tier-count{color:var(--text2);font-size:13px}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}

.score-ring{position:relative;width:52px;height:52px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg)}
.score-ring circle{fill:none;stroke-width:4}
.score-ring .bg{stroke:var(--surface2)}
.score-ring .fg{stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.score-ring .value{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;font-weight:700}

.card-info{flex:1;min-width:0}
.card-rank{font-size:11px;color:var(--text2);margin-bottom:2px}
.card-title{font-size:15px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card-title .trend{font-size:12px}
.card-title .trend.rising{color:var(--accent2)}
.card-title .trend.declining{color:var(--critical)}
.card-sub{font-size:12px;color:var(--text2);margin-bottom:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.diff-badge{padding:1px 8px;border-radius:4px;font-size:11px;font-weight:600}
.diff-easy{background:rgba(63,185,80,.15);color:#3fb950}
.diff-medium{background:rgba(210,153,34,.15);color:#d29922}
.diff-hard{background:rgba(248,81,73,.15);color:#f85149}
.lc-badge{color:var(--accent);font-size:11px;font-weight:600}

.conviction{font-size:13px;color:#d29922;margin-bottom:8px}
.card-companies{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.company-tag{background:var(--surface2);color:var(--text2);padding:2px 8px;border-radius:4px;font-size:11px;white-space:nowrap}
.company-tag .count{color:var(--accent);margin-left:3px;font-weight:600}
.card-concepts{display:flex;flex-wrap:wrap;gap:4px}
.concept-tag{background:rgba(88,166,255,.08);color:var(--accent);padding:2px 8px;border-radius:4px;font-size:11px}
.card-desc{color:var(--text2);font-size:13px;margin-top:8px;line-height:1.4}
.recency-chip{display:inline-flex;align-items:center;gap:4px;padding:1px 8px;border-radius:4px;font-size:11px;font-weight:600}
.recency-fresh{background:rgba(63,185,80,.15);color:#3fb950}
.recency-stale{background:rgba(139,148,158,.15);color:var(--text2)}
.card-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.mini-badge{padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600}
.mini-badge.b75{background:rgba(210,153,34,.15);color:#d29922}
.mini-badge.nc150{background:rgba(88,166,255,.1);color:var(--accent)}
.mini-badge.tier-badge{text-transform:uppercase;letter-spacing:.5px}
.mini-badge.tier-critical{background:rgba(248,81,73,.12);color:var(--critical)}
.mini-badge.tier-high{background:rgba(210,153,34,.12);color:var(--high)}

.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:1000;justify-content:center;align-items:center;padding:24px}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:720px;width:100%;max-height:85vh;overflow-y:auto;padding:32px;position:relative}
.modal-close{position:absolute;top:16px;right:16px;background:var(--surface2);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s}
.modal-close:hover{background:var(--border);color:white}
.modal h2{font-size:20px;margin-bottom:4px;padding-right:40px}
.modal-meta{display:flex;gap:12px;flex-wrap:wrap;margin:8px 0 16px;align-items:center}
.modal-section{margin-bottom:20px}
.modal-section h3{font-size:13px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.modal-section p{color:var(--text);font-size:14px;line-height:1.6}
.modal-companies{display:flex;flex-wrap:wrap;gap:6px}
.modal-company{background:var(--surface2);padding:4px 12px;border-radius:6px;font-size:13px;display:flex;align-items:center;gap:6px}
.modal-company .mc-count{color:var(--accent);font-weight:700}
.modal-sources{display:flex;flex-wrap:wrap;gap:6px}
.modal-source{background:rgba(88,166,255,.08);color:var(--accent);padding:4px 10px;border-radius:6px;font-size:12px}
.modal-risks li{color:var(--text2);font-size:13px;margin-bottom:4px;list-style:disc;margin-left:20px}
.modal-concepts{display:flex;flex-wrap:wrap;gap:6px}
.modal-concept{background:rgba(63,185,80,.08);color:var(--accent2);padding:4px 10px;border-radius:6px;font-size:12px}

.prep-panel{background:linear-gradient(135deg,rgba(88,166,255,.06),rgba(63,185,80,.05));border:1px solid rgba(88,166,255,.25);border-radius:12px;padding:18px 20px;margin-bottom:20px}
.prep-panel h3{font-size:14px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:8px;border:none;padding:0}
.prep-approach{color:var(--text);font-size:14px;line-height:1.6;margin-bottom:12px}
.prep-block{margin-bottom:12px}
.prep-block:last-child{margin-bottom:0}
.prep-block-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.prep-list{margin:0}
.prep-list li{color:var(--text);font-size:13px;margin-bottom:5px;list-style:none;position:relative;padding-left:20px;line-height:1.5}
.prep-list li::before{content:'';position:absolute;left:4px;top:8px;width:6px;height:6px;border-radius:50%;background:var(--accent2)}
.prep-mistakes li::before{background:var(--critical)}
.prep-followups li::before{background:var(--high)}
.prep-caveat{font-size:12px;color:var(--high);background:rgba(210,153,34,.1);border-radius:6px;padding:6px 10px;margin-top:4px}
.prep-empty{color:var(--text2);font-size:13px;font-style:italic}

.search-bar{max-width:1400px;margin:0 auto;padding:16px 32px 0}
.search-input{width:100%;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text2)}

.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.filter-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:rgba(88,166,255,.1);border-color:var(--accent);color:var(--accent)}

@media(max-width:768px){
.header-inner{flex-direction:column;align-items:flex-start}
.stat-bar-inner{gap:16px}
.cards{grid-template-columns:1fr}
.tabs{gap:0}
.tab{padding:8px 12px;font-size:13px}
}
</style>
</head>
<body>

<div class="header">
<div class="header-inner">
<h1><span>📊</span> Interview Questions Dashboard</h1>
<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
<span class="badge badge-pass">PASS __PASS_NUMBER__ COMPLETE</span>
<span class="badge-updated">Last updated: __LAST_UPDATED__</span>
</div>
</div>
</div>

<div class="stat-bar">
<div class="stat-bar-inner">
<div class="stat"><div class="stat-value">__TOTAL_QUESTIONS__</div><div class="stat-label">Total Questions</div></div>
<div class="stat"><div class="stat-value">__AVG_CONVICTION__</div><div class="stat-label">Avg Conviction</div></div>
<div class="stat"><div class="stat-value">__SOURCES_USED__</div><div class="stat-label">Sources Used</div></div>
<div class="stat"><div class="stat-value">__COMPANIES_COVERED__</div><div class="stat-label">Companies</div></div>
<div class="stat stat-critical"><div class="stat-value">__CRITICAL_COUNT__</div><div class="stat-label">Critical</div></div>
<div class="stat stat-high"><div class="stat-value">__HIGH_COUNT__</div><div class="stat-label">High</div></div>
<div class="stat stat-accent2"><div class="stat-value">__PASS_COUNT__</div><div class="stat-label">Pass Count</div></div>
</div>
</div>

<div class="search-bar">
<input type="text" class="search-input" id="searchInput" placeholder="Search questions, companies, concepts...">
<div class="filter-bar" id="filterBar">
<button class="filter-btn active" data-filter="all">All Tiers</button>
<button class="filter-btn" data-filter="CRITICAL">Critical</button>
<button class="filter-btn" data-filter="HIGH">High</button>
<button class="filter-btn" data-filter="rising">▲ Rising</button>
<button class="filter-btn" data-filter="recent">🕒 Recent only</button>
</div>
</div>

<div class="tabs-container">
<div class="tabs" id="tabs"></div>
</div>

<div class="content" id="content"></div>

<div class="modal-overlay" id="modalOverlay">
<div class="modal" id="modal"></div>
</div>

<script>
const DATA = __DASHBOARD_DATA__;

// Default tab config used only when DATA.category_meta is absent (older runs).
const DEFAULT_TAB_CONFIG = [
{id:'swe-coding',icon:'💻',label:'SWE Coding'},
{id:'swe-system-design',icon:'🏗️',label:'SWE System Design'},
{id:'swe-behavioral',icon:'🤝',label:'SWE Behavioral'},
{id:'aiml-coding',icon:'🧠',label:'AI/ML Coding'},
{id:'aiml-system-design',icon:'⚙️',label:'AI/ML System Design'},
{id:'aiml-conceptual',icon:'📊',label:'AI/ML Conceptual'}
];

// Build tabs from the live category registry so discovered categories render automatically.
// Any category present in DATA.categories but missing from category_meta still gets a tab.
function buildTabConfig(){
const meta=Array.isArray(DATA.category_meta)&&DATA.category_meta.length?DATA.category_meta:DEFAULT_TAB_CONFIG;
const seen=new Set();
const cfg=meta
.filter(m=>m&&m.id&&DATA.categories&&DATA.categories[m.id])
.map(m=>{seen.add(m.id);return {id:m.id,icon:m.icon||'📁',label:m.label||m.id};});
Object.keys(DATA.categories||{}).forEach(id=>{
if(!seen.has(id)) cfg.push({id,icon:'📁',label:id});
});
return cfg.length?cfg:DEFAULT_TAB_CONFIG;
}

const TAB_CONFIG = buildTabConfig();
const TIER_ORDER = ['CRITICAL','HIGH','MODERATE','EMERGING'];
let currentTab = (TAB_CONFIG[0]&&TAB_CONFIG[0].id)||'swe-coding';
let searchTerm = '';
let tierFilter = 'all';

function getScoreColor(score){
if(score>=90) return 'var(--critical)';
if(score>=75) return 'var(--high)';
if(score>=60) return 'var(--moderate)';
return 'var(--emerging)';
}

// "Recent" = asked within the rolling 3-year window [Y-2, Y]. Y is the dashboard's last-updated year.
function refYear(){
const m=(DATA.metadata&&DATA.metadata.last_updated)||'';
const y=parseInt(String(m).slice(0,4),10);
return isNaN(y)?new Date().getFullYear():y;
}
function isRecent(year){
return typeof year==='number' && year>=refYear()-2;
}
function renderRecencyChip(year){
if(typeof year!=='number') return '<span class="recency-chip recency-stale">No recent data</span>';
const cls=isRecent(year)?'recency-fresh':'recency-stale';
return `<span class="recency-chip ${cls}">🕒 Last asked ${year}</span>`;
}

function renderScoreRing(score){
const r=22, c=2*Math.PI*r, offset=c-(score/100)*c;
return `<div class="score-ring"><svg width="52" height="52" viewBox="0 0 52 52"><circle class="bg" cx="26" cy="26" r="${r}"/><circle class="fg" cx="26" cy="26" r="${r}" stroke="${getScoreColor(score)}" stroke-dasharray="${c}" stroke-dashoffset="${offset}"/></svg><div class="value" style="color:${getScoreColor(score)}">${score}</div></div>`;
}

function renderTabs(){
const tabsEl=document.getElementById('tabs');
tabsEl.innerHTML=TAB_CONFIG.map(t=>{
const count=DATA.categories[t.id]?.length||0;
return `<button class="tab${t.id===currentTab?' active':''}" data-tab="${t.id}">${t.icon} ${t.label}<span class="tab-count">${count}</span></button>`;
}).join('');
tabsEl.querySelectorAll('.tab').forEach(btn=>{
btn.onclick=()=>{currentTab=btn.dataset.tab;renderTabs();renderContent();}
});
}

function filterQuestions(questions){
let qs=questions;
if(searchTerm){
const s=searchTerm.toLowerCase();
qs=qs.filter(q=>
q.title.toLowerCase().includes(s)||
q.subcategory.toLowerCase().includes(s)||
q.description.toLowerCase().includes(s)||
q.companies.some(c=>c.name.toLowerCase().includes(s))||
q.concepts.some(c=>c.toLowerCase().includes(s))||
q.sources.some(c=>c.toLowerCase().includes(s))
);
}
if(tierFilter==='rising') qs=qs.filter(q=>q.trend&&q.trend.includes('▲'));
else if(tierFilter==='recent') qs=qs.filter(q=>isRecent(q.last_asked_year));
else if(tierFilter!=='all') qs=qs.filter(q=>q.tier===tierFilter);
return qs;
}

function renderCard(q){
const companies=q.companies.slice(0,5).map(c=>`<span class="company-tag">${c.name}<span class="count">${c.count}x</span></span>`).join('');
const extra=q.companies.length>5?`<span class="company-tag">+${q.companies.length-5} more</span>`:'';
const concepts=q.concepts.slice(0,4).map(c=>`<span class="concept-tag">${c}</span>`).join('');
const diffClass=q.difficulty==='Easy'?'diff-easy':q.difficulty==='Hard'?'diff-hard':'diff-medium';
const trendHtml=q.trend?(q.trend.includes('▲')?`<span class="trend rising">${q.trend}</span>`:`<span class="trend declining">${q.trend}</span>`):'';
const lcBadge=q.leetcode?`<span class="lc-badge">${q.leetcode}</span>`:'';
const badges=[];
if(q.in_blind75) badges.push('<span class="mini-badge b75">Blind 75</span>');
if(q.in_neetcode150) badges.push('<span class="mini-badge nc150">NeetCode 150</span>');

return `<div class="card" data-qid="${q.category}_${q.rank}" onclick="openModal('${q.category}',${q.rank})">
<div class="card-top">
${renderScoreRing(q.freq)}
<div class="card-info">
<div class="card-rank">#${q.rank} · ${q.subcategory}</div>
<div class="card-title">${q.title} ${lcBadge} ${trendHtml}</div>
<div class="card-sub"><span class="diff-badge ${diffClass}">${q.difficulty||'N/A'}</span><span class="conviction">${q.conviction}</span>${renderRecencyChip(q.last_asked_year)}</div>
</div>
</div>
<div class="card-companies">${companies}${extra}</div>
<div class="card-concepts">${concepts}</div>
<div class="card-desc">${q.description}</div>
${badges.length?'<div class="card-badges">'+badges.join('')+'</div>':''}
</div>`;
}

function renderContent(){
const contentEl=document.getElementById('content');
const questions=DATA.categories[currentTab]||[];
const filtered=filterQuestions(questions);
const byTier={};
TIER_ORDER.forEach(t=>byTier[t]=[]);
filtered.forEach(q=>{if(byTier[q.tier])byTier[q.tier].push(q);});

let html='';
TIER_ORDER.forEach(tier=>{
const qs=byTier[tier];
if(!qs.length) return;
html+=`<div class="tier-section">
<div class="tier-header"><div class="tier-dot ${tier.toLowerCase()}"></div><span class="tier-label ${tier.toLowerCase()}">${tier}</span><span class="tier-count">${qs.length} questions</span></div>
<div class="cards">${qs.map(renderCard).join('')}</div>
</div>`;
});
if(!filtered.length) html='<div style="text-align:center;padding:48px;color:var(--text2)">No questions match your search.</div>';
contentEl.innerHTML=html;
}

function renderPrepPanel(prep){
if(!prep || (!prep.approach && !(prep.key_points&&prep.key_points.length))){
return `<div class="prep-panel"><h3>🎯 How to Answer</h3><p class="prep-empty">Study notes not yet synthesized for this question. They are generated for every question on the final list during the next full run.</p></div>`;
}
const points=(prep.key_points||[]).map(p=>`<li>${p}</li>`).join('');
const mistakes=(prep.common_mistakes||[]).map(p=>`<li>${p}</li>`).join('');
const followups=(prep.followups||[]).map(p=>`<li>${p}</li>`).join('');
const lowConf=(typeof prep.confidence==='number'&&prep.confidence<0.7)
?`<div class="prep-caveat">⚠️ Lower-confidence notes — this question is novel or sparsely sourced. Verify against a primary reference.</div>`:'';
return `<div class="prep-panel">
<h3>🎯 How to Answer</h3>
${prep.approach?`<div class="prep-approach">${prep.approach}</div>`:''}
${points?`<div class="prep-block"><div class="prep-block-label">Key points to hit</div><ul class="prep-list">${points}</ul></div>`:''}
${mistakes?`<div class="prep-block"><div class="prep-block-label">Common mistakes</div><ul class="prep-list prep-mistakes">${mistakes}</ul></div>`:''}
${followups?`<div class="prep-block"><div class="prep-block-label">Likely follow-ups</div><ul class="prep-list prep-followups">${followups}</ul></div>`:''}
${lowConf}
</div>`;
}

function openModal(category,rank){
const q=(DATA.categories[category]||[]).find(q=>q.rank===rank);
if(!q) return;
const modal=document.getElementById('modal');
const diffClass=q.difficulty==='Easy'?'diff-easy':q.difficulty==='Hard'?'diff-hard':'diff-medium';
const trendHtml=q.trend?(q.trend.includes('▲')?`<span class="trend rising" style="font-size:14px">${q.trend}</span>`:`<span class="trend declining" style="font-size:14px">${q.trend}</span>`):'';
const tierClass=q.tier==='CRITICAL'?'tier-critical':'tier-high';

modal.innerHTML=`<button class="modal-close" onclick="closeModal()">✕</button>
<h2>${q.title} ${trendHtml}</h2>
<div class="modal-meta">
<span class="diff-badge ${diffClass}">${q.difficulty||'N/A'}</span>
${q.leetcode?`<span class="lc-badge" style="font-size:13px">${q.leetcode}</span>`:''}
<span class="conviction" style="font-size:15px">${q.conviction}</span>
<span class="mini-badge tier-badge ${tierClass}">${q.tier}</span>
${q.in_blind75?'<span class="mini-badge b75">Blind 75</span>':''}
${q.in_neetcode150?'<span class="mini-badge nc150">NeetCode 150</span>':''}
${renderRecencyChip(q.last_asked_year)}
${renderScoreRing(q.freq)}
</div>
<div class="modal-section"><h3>Description</h3><p>${q.description}</p></div>
${renderPrepPanel(q.prep)}
<div class="modal-section"><h3>Evidence Thesis</h3><p>${q.thesis}</p></div>
<div class="modal-section"><h3>Companies (${q.companies.length})</h3><div class="modal-companies">${q.companies.map(c=>`<div class="modal-company"><span>${c.name}</span><span class="mc-count">${c.count}x</span></div>`).join('')}</div></div>
<div class="modal-section"><h3>Key Concepts</h3><div class="modal-concepts">${q.concepts.map(c=>`<span class="modal-concept">${c}</span>`).join('')}</div></div>
<div class="modal-section"><h3>Sources (${q.sources.length})</h3><div class="modal-sources">${q.sources.map(s=>`<span class="modal-source">${s}</span>`).join('')}</div></div>
<div class="modal-section"><h3>Risks & Counterarguments</h3><ul class="modal-risks">${q.risks.map(r=>`<li>${r}</li>`).join('')}</ul></div>`;

document.getElementById('modalOverlay').classList.add('active');
document.body.style.overflow='hidden';
}

function closeModal(){
document.getElementById('modalOverlay').classList.remove('active');
document.body.style.overflow='';
}

document.getElementById('modalOverlay').addEventListener('click',function(e){
if(e.target===this) closeModal();
});
document.addEventListener('keydown',function(e){if(e.key==='Escape') closeModal();});

document.getElementById('searchInput').addEventListener('input',function(e){
searchTerm=e.target.value;renderContent();
});

document.getElementById('filterBar').addEventListener('click',function(e){
const btn=e.target.closest('.filter-btn');
if(!btn) return;
tierFilter=btn.dataset.filter;
document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
renderContent();
});

renderTabs();
renderContent();
</script>
</body>
</html>
